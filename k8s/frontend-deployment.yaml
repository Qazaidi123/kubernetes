apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend-depl
spec:
  replicas: 3
  selector:
    matchLabels:
      app: exploreworld
  template:
    metadata:
      labels:
        app: exploreworld
    spec:
      containers:
      - name: frontend-container
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 80
